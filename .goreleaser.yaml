version: 2

project_name: orbit-sentinel-mcp

builds:
  - binary: orbit-sentinel-mcp
    main: .
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  # No {{ .Version }} in the name — console links use
  # releases/latest/download/<name>, which requires stable asset names.
  - name_template: "orbit-sentinel-mcp_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# Pre-release tags (e.g. v0.2.0-rc1) must never become `latest` —
# the console's releases/latest/download URLs would serve the RC.
release:
  prerelease: auto

# Publishes a cask to viventine-space/homebrew-tap on each release.
# Needs the HOMEBREW_TAP_TOKEN secret (PAT with write access to the tap).
# The post-install hook clears macOS quarantine since the binary is
# not notarized yet.
homebrew_casks:
  - name: orbit-sentinel-mcp
    repository:
      owner: viventine-space
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/viventine-space/orbit-sentinel-mcp
    description: "MCP server for Orbit Sentinel — space regulatory filings from FCC, ITU, UNOOSA, FAA-AST"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/orbit-sentinel-mcp"]
          end

# Docker image for MCP clients that run servers via OCI — also the package
# the MCP registry entry points at (mcpb would need file hashes goreleaser
# doesn't emit). The registry validates the server-name label on the image.
dockers:
  - image_templates:
      - "ghcr.io/viventine-space/orbit-sentinel-mcp:{{ .Version }}"
      - "ghcr.io/viventine-space/orbit-sentinel-mcp:latest"
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--label=io.modelcontextprotocol.server.name=io.github.Viventine-Space/orbit-sentinel-mcp"
      - "--label=org.opencontainers.image.source=https://github.com/viventine-space/orbit-sentinel-mcp"
      - "--label=org.opencontainers.image.licenses=MIT"

# Publish server.json to the official MCP registry (registry.modelcontextprotocol.io).
# Auth is GitHub Actions OIDC — grants the io.github.viventine-space namespace.
mcp:
  name: io.github.Viventine-Space/orbit-sentinel-mcp
  title: "Orbit Sentinel — Space Regulatory Filings"
  # The registry caps description at 100 chars.
  description: "Search 419K+ space regulatory filings from FCC, ITU, UNOOSA, FAA-AST: entities, spectrum, alerts."
  homepage: "https://viventine.com/orbit-sentinel/"
  auth:
    type: github-oidc
  repository:
    url: "https://github.com/viventine-space/orbit-sentinel-mcp"
    source: github
    id: "1267671324"
  packages:
    - registry_type: oci
      identifier: "ghcr.io/viventine-space/orbit-sentinel-mcp:{{ .Version }}"
      transport:
        type: stdio

changelog:
  use: github-native
