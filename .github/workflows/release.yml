name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write   # push the OCI image to GHCR
  id-token: write   # GitHub OIDC for MCP registry publish

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # dockers_v2 pushes with --attest=type=sbom, which needs a
      # container-driver buildx builder (default docker driver can't).
      - uses: docker/setup-buildx-action@v3
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # Keeps the README's releases/latest/download/orbit-sentinel-mcp.mcpb
      # one-click link valid — goreleaser can't pack .mcpb itself.
      - name: Build and upload Claude Desktop bundle (.mcpb)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p mcpb-build/server
          jq --arg v "${GITHUB_REF_NAME#v}" '.version = $v' mcpb/manifest.json > mcpb-build/manifest.json
          DARWIN=$(jq -r '.[] | select(.type == "Binary" and .goos == "darwin" and .goarch == "all") | .path' dist/artifacts.json)
          LINUX=$(jq -r '.[] | select(.type == "Binary" and .goos == "linux" and .goarch == "amd64") | .path' dist/artifacts.json)
          WINDOWS=$(jq -r '.[] | select(.type == "Binary" and .goos == "windows") | .path' dist/artifacts.json)
          cp "$DARWIN" mcpb-build/server/orbit-sentinel-mcp-darwin
          cp "$LINUX" mcpb-build/server/orbit-sentinel-mcp-linux
          cp "$WINDOWS" mcpb-build/server/orbit-sentinel-mcp.exe
          npx -y @anthropic-ai/mcpb pack mcpb-build orbit-sentinel-mcp.mcpb
          gh release upload "$GITHUB_REF_NAME" orbit-sentinel-mcp.mcpb
